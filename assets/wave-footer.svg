<svg viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Animated light blue waves footer">
<title>Waving footer</title>
<defs>
<linearGradient id="gradf" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1E73BE"/>
<stop offset="1" stop-color="#89CFF0"/>
</linearGradient>
<path id="wf" d="M0,40 Q100,24 200,40 T400,40 T600,40 T800,40 T1000,40 T1200,40 T1400,40 T1600,40 T1800,40 T2000,40 T2200,40 T2400,40 L2400,160 L0,160 Z"/>
</defs>
<use xlink:href="#wf" fill="url(#gradf)" opacity="0.3">
<animateTransform attributeName="transform" type="translate" from="0 -16" to="-400 -16" dur="7s" begin="-2s" repeatCount="indefinite"/>
</use>
<use xlink:href="#wf" fill="url(#gradf)" opacity="0.55">
<animateTransform attributeName="transform" type="translate" from="0 -8" to="-400 -8" dur="5s" begin="-1s" repeatCount="indefinite"/>
</use>
<use xlink:href="#wf" fill="url(#gradf)">
<animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="3s" repeatCount="indefinite"/>
</use>
<text x="600" y="118" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="36" font-weight="700" fill="#ffffff" stroke="#0b4a73" stroke-width="0.6" paint-order="stroke">Thanks for visiting!</text>
</svg>
