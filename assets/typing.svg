<clipPath id="c3"><rect x="10" y="8" width="0" height="34"><animate attributeName="width" values="0;0;461;461;0;0" keyTimes="0;0.6667;0.8;0.9333;0.9889;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
